# Wanko rig — atlas region assignments
# Template: pet-mascot
# Texture: 1 × 1024px (texture_00.png)
# Total drawables: 33 (8 D_REF_PT reference points excluded — deformer anchors, ~1px)
#
# Left/right convention: lower atlas x = character's screen-left (viewer's left for mirrored anime rigs)
# Wanko is a symmetric bowl mascot — left/right ears and eyes are nearly symmetric in UV space.
# D_EAR_00 x=463 < D_EAR_01 x=763 → EAR_00 is character's left (lower x)
# D_EYE_00 x=388 < D_EYE_01 x=491 → EYE_00 is character's left

template          = "pet-mascot"
rig               = "wanko"
texture_size      = 1024
texture_count     = 1

