# Hiyori texture atlas region coordinates.
# Measured by visual analysis of texture_00.png / texture_01.png (2048×2048).
# Coordinates are tight bounding boxes of all sub-drawables that form each region.
# Left/right refer to the character's perspective (mirror of viewer).
#
# NOTE: mouth coords are approximate — sub-components are very small (< 60px each).
# Run measure_regions.py with UV extraction to refine all coords precisely.

rig          = "hiyori"
template     = "humanoid-anime"
texture_size = 2048

# texture_00 = face + hair
# texture_01 = body + clothing (out of Phase 1 scope)

# ── Face skin ────────────────────────────────────────────────────────────────
[[regions]]
name          = "face_skin"
texture_index = 0
x = 29
y = 20
w = 500
h = 575
# The large cream oval. Includes forehead through chin outline.

# ── Eyebrows ─────────────────────────────────────────────────────────────────
[[regions]]
name          = "left_eyebrow"
texture_index = 0
x = 20
y = 576
w = 230
h = 60
# Two thin dark arcs forming the left brow.

[[regions]]
name          = "right_eyebrow"
texture_index = 0
x = 317
y = 576
w = 213
h = 50
# Two thin dark arcs forming the right brow.

# ── Eyes ─────────────────────────────────────────────────────────────────────
# Each eye region is the union bbox of: sclera + lid + iris + pupil + highlights.
# The sub-components span a large y range because sclera (y≈709) and
# iris disc (y≈864) are laid out in separate rows in the atlas.

[[regions]]
name          = "left_eye"
texture_index = 0
x = 13
y = 648
w = 240
h = 650
# Sclera (near-white oval), iris (dark blue-grey disc), pupil + highlights.
# Left cluster in atlas (x ≈ 13–253).

[[regions]]
name          = "right_eye"
texture_index = 0
x = 292
y = 640
w = 238
h = 653
# Same components, right cluster in atlas (x ≈ 292–530).

# ── Mouth ────────────────────────────────────────────────────────────────────
[[regions]]
name          = "mouth"
texture_index = 0
x = 15
y = 820
w = 520
h = 185
# REVIEW: sub-components are tiny (< 60px each). Includes lip line (bright red),
# teeth (near-white), and inner mouth. Exact coords need UV extraction to confirm.

# ── Cheeks ───────────────────────────────────────────────────────────────────
[[regions]]
name          = "left_cheek"
texture_index = 0
x = 62
y = 1192
w = 156
h = 109
# Soft blush oval, light peach-pink. Left cluster in atlas.

[[regions]]
name          = "right_cheek"
texture_index = 0
x = 292
y = 1193
w = 176
h = 113
# Soft blush oval, right cluster in atlas.

# ── Hair ─────────────────────────────────────────────────────────────────────
[[regions]]
name          = "hair_front"
texture_index = 0
x = 563
y = 20
w = 1310
h = 490
# Union of three front-hair pieces:
#   - Peach/blonde highlight chunk (x=563, y=40, 464×402)
#   - Dark brown hair frame + highlights (x=1385, y=62, 488×446)
#   - Small top-center piece (x=1026, y=20, 179×122)
# Large bbox; only the actual UV regions of the drawables will be visible.

[[regions]]
name          = "hair_back"
texture_index = 0
x = 1180
y = 867
w = 831
h = 1136
# The dominant large dark-brown back hair mass. Bottom-right quadrant of texture.

[[regions]]
name          = "hair_side_left"
texture_index = 0
x = 606
y = 463
w = 204
h = 842
# Main left-side physics strand (long, center-left of texture).

[[regions]]
name          = "hair_side_right"
texture_index = 0
x = 1081
y = 61
w = 754
h = 913
# Union of three right-side strands:
#   - Center-right strand (x=1081, y=446, 181×842)
#   - Right strand (x=1273, y=61, 154×839)
#   - Far-right strand (x=1835, y=65, 160×909)
