# humanoid-anime template parameter schema (v2)
#
# Canonical ordered parameter list. The MLP predicts these in this order.
# Each param has:
#   range  — [min, max] valid range (what the rig accepts)
#   default — value when verb does not override
#   curve  — post-MLP response curve applied at inference time
#
# Ordering is STABLE — do not reorder without retraining models.
#
# Dropped from v1 (unsolvable via LivePortrait + MediaPipe):
#   BrowLAngle, BrowRAngle — LivePortrait has no brow tilt control (max r=0.12)
#   EyeBallY              — pupil_y produces negligible vertical shift (max r=0.18)
#
# These params are NOT predicted by the MLP. At runtime they should be
# driven by alternative sources:
#   - BCI signals (Muse VTuber Bridge custom params)
#   - Dedicated detectors (e.g. gaze-tracking model for EyeBallY)
#   - Manual sliders in the VTuber app
#   - Rule-based coupling (e.g. EyeBallY tracks head pitch)
# Can be re-added to MLP if a better rendering source provides ground truth.

# ---- Head pose (angles in degrees; labels come from MediaPipe, not verbs) ----
[[params]]
name = "AngleX"
range = [-30.0, 30.0]
default = 0.0
curve = "linear"

[[params]]
name = "AngleY"
range = [-20.0, 20.0]
default = 0.0
curve = "linear"

[[params]]
name = "AngleZ"
range = [-20.0, 20.0]
default = 0.0
curve = "linear"

# ---- Eyes ----
[[params]]
name = "EyeLOpen"
range = [0.0, 1.0]
default = 1.0
curve = "gamma:0.7"

[[params]]
name = "EyeROpen"
range = [0.0, 1.0]
default = 1.0
curve = "gamma:0.7"

[[params]]
name = "EyeBallX"
range = [-1.0, 1.0]
default = 0.0
curve = "linear"

[[params]]
name = "EyeLSmile"
range = [0.0, 1.0]
default = 0.0
curve = "gamma:0.8"

[[params]]
name = "EyeRSmile"
range = [0.0, 1.0]
default = 0.0
curve = "gamma:0.8"

# ---- Brows ----
[[params]]
name = "BrowLY"
range = [-1.0, 1.0]
default = 0.0
curve = "linear"

[[params]]
name = "BrowRY"
range = [-1.0, 1.0]
default = 0.0
curve = "linear"

# ---- Mouth ----
[[params]]
name = "MouthOpenY"
range = [0.0, 1.0]
default = 0.0
curve = "gamma:0.6"

[[params]]
name = "MouthForm"
range = [-1.0, 1.0]
default = 0.0
curve = "linear"

[[params]]
name = "Cheek"
range = [0.0, 1.0]
default = 0.0
curve = "linear"
